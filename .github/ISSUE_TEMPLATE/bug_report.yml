name: Bug report
description: Report something that does not work correctly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version or release ZIP
      placeholder: "v1.2.0-alpha / hotfix archive name / commit"
  - type: dropdown
    id: windows
    attributes:
      label: Windows version
      options:
        - Windows 11
        - Windows 10
        - Other
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open...\n2. Click...\n3. See..."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Attach relevant logs from data/logs if safe to share.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I tested full stop/exit after the issue.
        - label: I checked Task Manager for remaining zapret processes.
        - label: I am not posting private/personal domains or sensitive logs.
