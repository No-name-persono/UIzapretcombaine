name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the app do?
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks or tradeoffs
      description: Does this affect process cleanup, updater behavior, or bundled upstream components?
