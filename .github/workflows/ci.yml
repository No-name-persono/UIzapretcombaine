name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  syntax:
    name: Syntax check
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements-dev.txt

      - name: Compile Python files
        run: |
          python -m py_compile main.py core.py ui.py upstreams.py tg_ws_proxy.py flowseal_profiles.py generator.py fetch_release_components.py prepare_release_assets.py

      - name: Prepare release asset skeleton
        run: |
          python prepare_release_assets.py
